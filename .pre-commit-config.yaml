repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-case-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=no]
  - repo: local
    hooks:
      - id: gitleaks-staged
        name: detect staged secrets with Gitleaks
        entry: .tools/gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        require_serial: true

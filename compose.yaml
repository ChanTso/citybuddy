name: citybuddy

x-mysql-image: &mysql-image mysql:8.4.10@sha256:c831a0f11348d402b43d77453e17d770be2eef356615a2823fe0f5a0d6c8b9af
x-redis-image: &redis-image redis:7.2.14-bookworm@sha256:3d550f0b980dbf676953180fd6463dde8a982a74947a09656c98051c0a618faa
x-elasticsearch-image: &elasticsearch-image ${ELASTICSEARCH_IMAGE:-citybuddy-elasticsearch-ik:8.19.8}
x-rocketmq-image: &rocketmq-image apache/rocketmq:5.5.0@sha256:7e8f6c9dbd9df742ed26ba69c00d4ad69e2f86a56f3ca7782ff8144dd0798132
x-rocketmq-probe-image: &rocketmq-probe-image ${ROCKETMQ_PROBE_IMAGE:-citybuddy-rocketmq-probe:5.2.1}
x-migration-service: &migration-service
  image: *mysql-image
  restart: "no"
  depends_on:
    mysql:
      condition: service_healthy
  entrypoint: ["/bin/bash", "/opt/citybuddy/run-migrations.sh"]
  environment:
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"

x-grant-service: &grant-service
  image: *mysql-image
  restart: "no"
  depends_on:
    mysql:
      condition: service_healthy
  entrypoint: ["/bin/bash", "/opt/citybuddy/apply-grants.sh"]
  environment:
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_USER: bootstrap_admin
    MYSQL_PASSWORD: ${MYSQL_BOOTSTRAP_PASSWORD:?Run make init-local first}
  volumes:
    - ./scripts/apply_mysql_grants.sh:/opt/citybuddy/apply-grants.sh:ro
    - ./infra/mysql/grants:/opt/citybuddy/grants:ro

services:
  mysql:
    image: *mysql-image
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_BOOTSTRAP_PASSWORD:?Run make init-local first}
      MYSQL_BOOTSTRAP_PASSWORD: ${MYSQL_BOOTSTRAP_PASSWORD:?Run make init-local first}
      MYSQL_AUTH_MIGRATION_PASSWORD: ${MYSQL_AUTH_MIGRATION_PASSWORD:?Run make init-local first}
      MYSQL_COMMERCE_MIGRATION_PASSWORD: ${MYSQL_COMMERCE_MIGRATION_PASSWORD:?Run make init-local first}
      MYSQL_AGENT_MIGRATION_PASSWORD: ${MYSQL_AGENT_MIGRATION_PASSWORD:?Run make init-local first}
      MYSQL_AUTH_APP_PASSWORD: ${MYSQL_AUTH_APP_PASSWORD:?Run make init-local first}
      MYSQL_COMMERCE_APP_PASSWORD: ${MYSQL_COMMERCE_APP_PASSWORD:?Run make init-local first}
      MYSQL_AGENT_APP_PASSWORD: ${MYSQL_AGENT_APP_PASSWORD:?Run make init-local first}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --activate-all-roles-on-login=OFF
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init/010-accounts.sh:/docker-entrypoint-initdb.d/010-accounts.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - MYSQL_PWD="$${MYSQL_ROOT_PASSWORD}" mysql --protocol=socket --user=root --database=mysql --batch --skip-column-names --execute='SELECT 1' | grep -qx 1
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 20s

  mysql-grants:
    <<: *grant-service

  auth-migrate:
    <<: *migration-service
    volumes:
      - ./scripts/run_mysql_migrations.sh:/opt/citybuddy/run-migrations.sh:ro
      - ./infra/mysql/migrations/auth:/opt/citybuddy/migrations:ro
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: auth_migration
      MYSQL_PASSWORD: ${MYSQL_AUTH_MIGRATION_PASSWORD:?Run make init-local first}
      MYSQL_DATABASE: commerce_db
      MIGRATION_STREAM: auth

  commerce-migrate:
    <<: *migration-service
    volumes:
      - ./scripts/run_mysql_migrations.sh:/opt/citybuddy/run-migrations.sh:ro
      - ./infra/mysql/migrations/commerce:/opt/citybuddy/migrations:ro
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: commerce_migration
      MYSQL_PASSWORD: ${MYSQL_COMMERCE_MIGRATION_PASSWORD:?Run make init-local first}
      MYSQL_DATABASE: commerce_db
      MIGRATION_STREAM: commerce

  agent-migrate:
    <<: *migration-service
    volumes:
      - ./scripts/run_mysql_migrations.sh:/opt/citybuddy/run-migrations.sh:ro
      - ./infra/mysql/migrations/agent:/opt/citybuddy/migrations:ro
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: agent_migration
      MYSQL_PASSWORD: ${MYSQL_AGENT_MIGRATION_PASSWORD:?Run make init-local first}
      MYSQL_DATABASE: cs_db
      MIGRATION_STREAM: agent

  redis-commerce:
    image: *redis-image
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_COMMERCE_PASSWORD:?Run make init-local first}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction
      - --dir
      - /data
    environment:
      REDIS_PASSWORD: ${REDIS_COMMERCE_PASSWORD:?Run make init-local first}
    ports:
      - "127.0.0.1:${REDIS_COMMERCE_PORT:-6379}:6379"
    volumes:
      - redis-commerce-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          redis-cli --no-auth-warning --pass "$${REDIS_PASSWORD}" PING | grep -qx PONG &&
          test "$$(redis-cli --no-auth-warning --pass "$${REDIS_PASSWORD}" CONFIG GET maxmemory-policy | tail -n 1)" = noeviction &&
          test "$$(redis-cli --no-auth-warning --pass "$${REDIS_PASSWORD}" CONFIG GET appendonly | tail -n 1)" = yes
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis-support:
    image: *redis-image
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_SUPPORT_PASSWORD:?Run make init-local first}
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - volatile-lfu
      - --dir
      - /data
    environment:
      REDIS_PASSWORD: ${REDIS_SUPPORT_PASSWORD:?Run make init-local first}
    ports:
      - "127.0.0.1:${REDIS_SUPPORT_PORT:-6380}:6379"
    volumes:
      - redis-support-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          redis-cli --no-auth-warning --pass "$${REDIS_PASSWORD}" PING | grep -qx PONG &&
          test "$$(redis-cli --no-auth-warning --pass "$${REDIS_PASSWORD}" CONFIG GET maxmemory-policy | tail -n 1)" = volatile-lfu &&
          test "$$(redis-cli --no-auth-warning --pass "$${REDIS_PASSWORD}" CONFIG GET maxmemory | tail -n 1)" -gt 0
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  elasticsearch:
    build:
      context: ./infra/elasticsearch
    image: *elasticsearch-image
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=3s' | grep -Eq '"status":"(yellow|green)"' &&
          curl -fsS 'http://localhost:9200/_cat/plugins?h=component,version' | grep -Eq '^analysis-ik[[:space:]]+8.19.8$$' &&
          curl -fsS -X POST 'http://localhost:9200/_analyze' -H 'Content-Type: application/json' --data '{"analyzer":"ik_smart","text":"CityBuddy本地商店"}' | grep -q '"tokens"'
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 20s

  rocketmq-namesrv:
    image: *rocketmq-image
    restart: unless-stopped
    command: ["sh", "mqnamesrv"]
    environment:
      HEAP_OPTS: -Xms256m -Xmx256m -Xmn128m
    healthcheck:
      test:
        - CMD-SHELL
        - sh mqadmin getNamesrvConfig --namesrvAddr localhost:9876 | grep -q '='
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 10s

  rocketmq-store-init:
    image: *rocketmq-image
    user: "0:0"
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 3000:3000 /home/rocketmq/store"]
    volumes:
      - rocketmq-store:/home/rocketmq/store

  rocketmq-broker-proxy:
    image: *rocketmq-image
    restart: unless-stopped
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - exec sh mqbroker ${ROCKETMQ_PROXY_ARGS---enable-proxy} --namesrvAddr rocketmq-namesrv:9876 --configFile ../conf/citybuddy-broker.conf
    environment:
      HEAP_OPTS: -Xms512m -Xmx512m -Xmn256m -XX:MaxDirectMemorySize=256m
    ports:
      - "127.0.0.1:${ROCKETMQ_PROXY_PORT:-8081}:8081"
    volumes:
      - rocketmq-store:/home/rocketmq/store
      - ./infra/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.5.0/conf/citybuddy-broker.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - sh mqadmin clusterList --namesrvAddr rocketmq-namesrv:9876 --clusterName DefaultCluster | grep -Fq DefaultCluster
      interval: 3s
      timeout: 10s
      retries: 20
      start_period: 20s

  rocketmq-admin:
    image: *rocketmq-image
    restart: "no"
    entrypoint: ["sh", "mqadmin"]

  rocketmq-probe:
    build:
      context: .
      dockerfile: infra/rocketmq/probe/Dockerfile
    image: *rocketmq-probe-image
    restart: unless-stopped
    depends_on:
      rocketmq-broker-proxy:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - java
        - -jar
        - /opt/citybuddy/rocketmq-probe.jar
        - route
        - rocketmq-broker-proxy:8081
        - cb013-readiness
      interval: 5s
      timeout: 15s
      retries: 6
      start_period: 5s

volumes:
  mysql-data:
  redis-commerce-data:
  redis-support-data:
  elasticsearch-data:
  rocketmq-store:
